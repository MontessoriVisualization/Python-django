<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart system</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Space+Grotesk:wght@400;500;600&display=swap");

        :root{
            --ink: #1f1c1a;
            --muted: #6a625c;
            --bg: #f6f3ee;
            --card: #fffaf3;
            --accent: #d97728;
            --accent-deep: #b25f1d;
            --teal: #1f7a7a;
            --shadow: 0 16px 40px rgba(33, 24, 17, 0.15);
        }

        *{
            box-sizing: border-box;
        }

        body{
            margin: 0;
            min-height: 100vh;
            font-family: "Space Grotesk", "Segoe UI", sans-serif;
            background: radial-gradient(circle at top left, #fff7e9 0%, var(--bg) 45%, #f1ebe2 100%);
            color: var(--ink);
        }

        .container{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 22px;
            padding: 28px 360px 40px 28px;
        }

        .card{
            background-color: var(--card);
            border: 1px solid rgba(70, 60, 50, 0.1);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover{
            transform: translateY(-4px);
            box-shadow: 0 22px 50px rgba(33, 24, 17, 0.2);
        }

        .card .img{
            position: relative;
        }

        .card .img img{
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
        }

        .card .content{
            padding: 16px 16px 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card .content h2{
            font-family: "Fraunces", serif;
            font-size: 1.2rem;
            margin: 0;
            letter-spacing: 0.2px;
        }

        .card .content p{
            margin: 0;
            color: var(--muted);
            font-weight: 500;
        }

        .add-to-cart{
            background: linear-gradient(135deg, var(--accent), var(--accent-deep));
            color: #fff;
            border: none;
            padding: 10px 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .add-to-cart:hover{
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(217, 119, 40, 0.35);
        }

        .Cart-container{
            position: fixed;
            right: 24px;
            top: 24px;
            width: 300px;
            background-color: #ffffff;
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 20px;
            border: 1px solid rgba(31, 28, 26, 0.08);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .Cart-container h2{
            margin: 0;
            font-family: "Fraunces", serif;
            font-size: 1.25rem;
        }

        .cart-item{
            border-bottom: 1px dashed rgba(31, 28, 26, 0.15);
            padding: 12px 0;
        }

        .cart-item:last-child{
            border-bottom: none;
        }

        .cart-item h2{
            font-size: 1rem;
            margin: 0 0 6px;
            font-weight: 600;
        }

        .cart-item .price{
            margin: 0 0 10px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .cart-inc-dec{
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #f6f2ea;
            padding: 6px 10px;
            border-radius: 999px;
        }

        .cart-inc-dec button{
            background-color: var(--teal);
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            cursor: pointer;
            border-radius: 50%;
            font-weight: 700;
        }

        .quantity{
            min-width: 18px;
            text-align: center;
            font-weight: 600;
        }

        @media (max-width: 900px){
            .container{
                padding: 22px;
            }

            .Cart-container{
                position: static;
                width: auto;
                margin: 0 22px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
    </div>
    <div class="Cart-container">
       <div class="total-price">
        <h2>Total: $0.00</h2>
       </div>

    </div>
 


</body>
<script>
    const container = document.querySelector(".container");
    const itemsList = [
        {
            id: 1,
            name: "Ceramic Pour-Over Set",
            price: 34.5,
            image: "https://images.unsplash.com/photo-1501004318641-b39e6451bec6?auto=format&fit=crop&w=600&q=80"
        },
        {
            id: 2,
            name: "Handmade Linen Apron",
            price: 28.0,
            image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=600&q=80"
        },
        {
            id: 3,
            name: "Cedar Soy Candle",
            price: 16.75,
            image: "https://images.unsplash.com/photo-1502741126161-b048400d3c0b?auto=format&fit=crop&w=600&q=80"
        },
        {
            id: 4,
            name: "Minimal Desk Organizer",
            price: 22.9,
            image: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=600&q=80"
        },
        {
            id: 5,
            name: "Recycled Leather Notebook",
            price: 12.5,
            image: "https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=600&q=80"
        }
    ];
    const cartlist = [];
  
    function createCard(item){
        const card = document.createElement("div");
        card.classList.add("card");
        card.setAttribute("id", item.id);

        card.innerHTML = `
        <div class="img">
            <img src="${item.image}" alt="${item.name}">
        </div>
        <div class="content">
            <h2>${item.name}</h2>
            <p>Price: $${item.price}</p>
            <button class="add-to-cart">Add to Cart</button>
        </div>
        `;
        return card;
    }
    itemsList.forEach(item => {
        const card = createCard(item);
        container.appendChild(card);
    });
      const addToCartButtons = document.querySelectorAll(".add-to-cart");
      addToCartButtons.forEach(button => {
        button.addEventListener("click", function(){
            const card = button.closest(".card");
            const itemId = card.getAttribute("id");
            const item = itemsList.find(i => i.id == itemId);
            if(item){
                cartlist.push(item);
                const cartItem = createCartItem(item);
                document.querySelector(".Cart-container").appendChild(cartItem);
                newcart();
                console.log(cartlist);
            }
        });
      });

function newcart(){
    const decrementButtons = document.querySelectorAll(".decrease");
    const incrementButtons = document.querySelectorAll(".increase");
    
    decrementButtons.forEach(button => {
        button.addEventListener("click", function(){
            console.log('decrement clicked');
            const cartItem = button.closest(".cart-item");
            const quantityElement = cartItem.querySelector(".quantity");
            let quantity = Number(quantityElement.textContent);
            if(quantity > 0){
                quantity--;
                quantityElement.textContent = quantity;
            }
        });
    });
    
    incrementButtons.forEach(button => {
        button.addEventListener("click", function(){
            console.log("Increment button clicked");
            const cartItem = button.closest(".cart-item");
            const quantityElement = cartItem.querySelector(".quantity");
            let quantity = Number(quantityElement.textContent);
            quantity++;
            quantityElement.textContent = quantity;
        });
    });
}

function createCartItem(item){
    const cartItem = document.createElement("div");
    cartItem.classList.add("cart-item");
    cartItem.setAttribute("id", `cart-item-${item.id}`);
    cartItem.innerHTML = `
        <h2>${item.name}</h2>
        <p class="price">Total: $${item.price}</p>
        <div class="cart-inc-dec">
            <button class="decrease">-</button>
            <span class="quantity">1</span>
            <button class="increase">+</button>
        </div>
    `;
    return cartItem;
}
const total = 0;
</script>

</html>
