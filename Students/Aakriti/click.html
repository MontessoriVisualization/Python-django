<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function clicked(){
            const butn = document.querySelector(".butn");
            butn.textContent = "Clicked";
        
        }
    </script>
</head>
<body>
    <button class="butn" onclick="clicked()"> Click Me</button>
</body>
</html>
