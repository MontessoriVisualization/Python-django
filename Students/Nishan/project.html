<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Shop</title>
<style>
    body {
        font-family: Arial;
        margin: 0;
        background: #f5f5f5;
    }

    header {
        background: orange;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 24px;
    }

    .container {
        display: flex;
        padding: 20px;
    }

    .products {
        width: 70%;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
    }

    .card {
        background: white;
        padding: 10px;
        border-radius: 8px;
        text-align: center;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
    }

    .card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 6px;
        display: block;
        transition: transform 0.3s ease, filter 0.3s ease;
        filter: brightness(1);
    }

    .card:hover img {
        transform: scale(1.05);
        filter: brightness(1.05);
    }

    button {
        background: orange;
        color: white;
        border: none;
        padding: 8px;
        cursor: pointer;
        margin-top: 10px;
    }

    .cart {
        width: 30%;
        background: white;
        padding: 15px;
        margin-left: 20px;
        border-radius: 5px;
    }

    .cart-item {
        display: flex;
        justify-content: space-between;
        margin: 5px 0;
    }

    .total {
        font-weight: bold;
        margin-top: 10px;
    }
</style>
</head>
<body>

<header>🛍 Mini Daraz Store</header>

<div class="container">

    <!-- Products -->
    <div class="products" id="productList"></div>

    <!-- Cart -->
    <div class="cart">
        <h3>Cart</h3>
        <div id="cartItems"></div>
        <div class="total">Total: Rs <span id="total">0</span></div>
    </div>

</div>

<script>
const products = [
    { id: 1, name: "Shoes", price: 2000, img: "shoes.jpg" },
    { id: 2, name: "Watch", price: 1500, img: "watch.jpg" },
    { id: 3, name: "Bag", price: 1200, img: "bag.jpg" },
    { id: 4, name: "Headphone", price: 1800, img: "head phone.jpg" },
    { id: 5, name: "Jacket", price: 2500, img: "jacket.jpg" },
    { id: 6, name: "Mobile", price: 15000, img: "mobile.jpg" }
];

let cart = [];

// Display products
function showProducts() {
    const productList = document.getElementById("productList");
    productList.innerHTML = "";

    products.forEach(p => {
        productList.innerHTML += `
            <div class="card">
                <img src="${p.img}">
                <h4>${p.name}</h4>
                <p>Rs ${p.price}</p>
                <button onclick="addToCart(${p.id})">Add to Cart</button>
            </div>
        `;
    });
}

// Add to cart
function addToCart(id) {
    const product = products.find(p => p.id === id);
    cart.push(product);
    updateCart();
}

// Update cart
function updateCart() {
    const cartItems = document.getElementById("cartItems");
    const totalEl = document.getElementById("total");

    cartItems.innerHTML = "";
    let total = 0;

    cart.forEach((item, index) => {
        total += item.price;

        cartItems.innerHTML += `
            <div class="cart-item">
                ${item.name} - Rs ${item.price}
                <button onclick="removeItem(${index})">X</button>
            </div>
        `;
    });

    totalEl.innerText = total;
}

// Remove item
function removeItem(index) {
    cart.splice(index, 1);
    updateCart();
}

// Start
showProducts();
</script>

</body>
</html>
